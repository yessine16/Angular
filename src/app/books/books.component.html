<div class="page-heading"><div><h1>Livres</h1><p>Catalogue et disponibilité des ouvrages</p></div><a *ngIf="auth.isAdmin()" mat-flat-button color="primary" routerLink="/books/create"><mat-icon>add</mat-icon>Ajouter</a></div>
<mat-card class="table-card">
  <div class="table-tools"><mat-form-field appearance="outline"><mat-label>Rechercher</mat-label><input matInput (keyup)="applyFilter($event)"><mat-icon matSuffix>search</mat-icon></mat-form-field></div>
  <div class="table-scroll"><table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="isbn"><th mat-header-cell *matHeaderCellDef mat-sort-header>ISBN</th><td mat-cell *matCellDef="let x">{{ x.isbn }}</td></ng-container>
    <ng-container matColumnDef="title"><th mat-header-cell *matHeaderCellDef mat-sort-header>Titre</th><td mat-cell *matCellDef="let x"><strong>{{ x.title }}</strong></td></ng-container>
    <ng-container matColumnDef="author"><th mat-header-cell *matHeaderCellDef mat-sort-header>Auteur</th><td mat-cell *matCellDef="let x">{{ x.author }}</td></ng-container>
    <ng-container matColumnDef="category"><th mat-header-cell *matHeaderCellDef mat-sort-header>Catégorie</th><td mat-cell *matCellDef="let x"><span class="tag">{{ x.category }}</span></td></ng-container>
    <ng-container matColumnDef="quantity"><th mat-header-cell *matHeaderCellDef>Exemplaires</th><td mat-cell *matCellDef="let x">{{ x.quantity }}</td></ng-container>
    <ng-container matColumnDef="available"><th mat-header-cell *matHeaderCellDef>Disponibles</th><td mat-cell *matCellDef="let x"><span [class.low]="x.available === 0">{{ x.available }}</span></td></ng-container>
    <ng-container matColumnDef="readers">
      <th mat-header-cell *matHeaderCellDef>Lecteurs liés</th>
      <td mat-cell *matCellDef="let x">
        <div class="relation-list" *ngIf="getReadersByBook(x.id).length; else noReader">
          <span *ngFor="let reader of getReadersByBook(x.id)">{{ reader }}</span>
        </div>
        <ng-template #noReader><span class="empty-relation">Aucun emprunt</span></ng-template>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th><td mat-cell *matCellDef="let x"><a mat-icon-button [routerLink]="['/books/edit', x.id]" title="Modifier"><mat-icon>edit</mat-icon></a><button mat-icon-button color="warn" (click)="deleteBook(x)" title="Supprimer"><mat-icon>delete</mat-icon></button></td></ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr><tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table></div><mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]"></mat-paginator>
</mat-card>
