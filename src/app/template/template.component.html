<mat-sidenav-container class="layout">
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="brand">
      <mat-icon>local_library</mat-icon>
      <div><strong>BiblioGest</strong><span>Gestion de bibliothèque</span></div>
    </div>
    <mat-nav-list>
      <a *ngIf="auth.isAdmin()" mat-list-item routerLink="/dashboard" routerLinkActive="active"><mat-icon>dashboard</mat-icon><span>Tableau de bord</span></a>
      <a *ngIf="auth.isAdmin()" mat-list-item routerLink="/books" routerLinkActive="active"><mat-icon>menu_book</mat-icon><span>Livres</span></a>
      <a *ngIf="auth.isAdmin()" mat-list-item routerLink="/readers" routerLinkActive="active"><mat-icon>groups</mat-icon><span>Lecteurs</span></a>
      <a mat-list-item routerLink="/borrowings" routerLinkActive="active"><mat-icon>swap_horiz</mat-icon><span>Emprunts</span></a>
      <a mat-list-item routerLink="/requests" routerLinkActive="active"><mat-icon>library_add</mat-icon><span>Demandes</span></a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar>
      <span class="page-title">{{ auth.isAdmin() ? 'Administration' : 'Consultation' }}</span>
      <span class="spacer"></span>
      <button mat-button [matMenuTriggerFor]="account"><mat-icon>account_circle</mat-icon> {{ auth.session?.name }}</button>
      <mat-menu #account="matMenu">
        <div class="role-label">{{ auth.session?.role }}</div>
        <button mat-menu-item (click)="auth.logout()"><mat-icon>logout</mat-icon>Déconnexion</button>
      </mat-menu>
    </mat-toolbar>
    <main class="content"><router-outlet></router-outlet></main>
  </mat-sidenav-content>
</mat-sidenav-container>
