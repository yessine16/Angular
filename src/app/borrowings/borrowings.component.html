<div class="page-heading"><div><h1>Emprunts</h1><p>Suivi des prêts, retours et retards</p></div><a *ngIf="auth.isAdmin()" mat-flat-button color="primary" routerLink="/borrowings/create"><mat-icon>add</mat-icon>Nouvel emprunt</a></div>
<mat-card class="table-card"><div class="table-tools"><mat-form-field appearance="outline"><mat-label>Rechercher</mat-label><input matInput (keyup)="applyFilter($event)"><mat-icon matSuffix>search</mat-icon></mat-form-field></div>
<div class="table-scroll"><table mat-table [dataSource]="filtered">
  <ng-container matColumnDef="book"><th mat-header-cell *matHeaderCellDef>Livre</th><td mat-cell *matCellDef="let x"><strong>{{ bookTitle(x.bookId) }}</strong></td></ng-container>
  <ng-container matColumnDef="reader"><th mat-header-cell *matHeaderCellDef>Lecteur</th><td mat-cell *matCellDef="let x">{{ readerName(x.readerId) }}</td></ng-container>
  <ng-container matColumnDef="borrowDate"><th mat-header-cell *matHeaderCellDef>Date d'emprunt</th><td mat-cell *matCellDef="let x">{{ x.borrowDate | date:'dd/MM/yyyy' }}</td></ng-container>
  <ng-container matColumnDef="dueDate"><th mat-header-cell *matHeaderCellDef>Retour prévu</th><td mat-cell *matCellDef="let x">{{ x.dueDate | date:'dd/MM/yyyy' }}</td></ng-container>
  <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Statut</th><td mat-cell *matCellDef="let x"><span class="status" [class.late]="x.status === 'En retard'" [class.returned]="x.status === 'Retourné'">{{ x.status }}</span></td></ng-container>
  <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th><td mat-cell *matCellDef="let x"><button *ngIf="x.status !== 'Retourné'" mat-icon-button color="primary" (click)="returnBorrowing(x)" title="Enregistrer le retour"><mat-icon>assignment_return</mat-icon></button><a mat-icon-button [routerLink]="['/borrowings/edit', x.id]" title="Modifier"><mat-icon>edit</mat-icon></a><button mat-icon-button color="warn" (click)="deleteBorrowing(x)" title="Supprimer"><mat-icon>delete</mat-icon></button></td></ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr><tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table></div></mat-card>
