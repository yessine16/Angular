<div class="page-heading"><div><h1>Lecteurs</h1><p>Adhérents inscrits à la bibliothèque</p></div><a *ngIf="auth.isAdmin()" mat-flat-button color="primary" routerLink="/readers/create"><mat-icon>person_add</mat-icon>Ajouter</a></div>
<mat-card class="table-card"><div class="table-tools"><mat-form-field appearance="outline"><mat-label>Rechercher</mat-label><input matInput (keyup)="applyFilter($event)"><mat-icon matSuffix>search</mat-icon></mat-form-field></div>
<div class="table-scroll"><table mat-table [dataSource]="dataSource" matSort>
  <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef mat-sort-header>Lecteur</th><td mat-cell *matCellDef="let x"><strong>{{ x.firstName }} {{ x.lastName }}</strong></td></ng-container>
  <ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef mat-sort-header>E-mail</th><td mat-cell *matCellDef="let x">{{ x.email }}</td></ng-container>
  <ng-container matColumnDef="phone"><th mat-header-cell *matHeaderCellDef>Téléphone</th><td mat-cell *matCellDef="let x">{{ x.phone }}</td></ng-container>
  <ng-container matColumnDef="registrationDate"><th mat-header-cell *matHeaderCellDef mat-sort-header>Inscription</th><td mat-cell *matCellDef="let x">{{ x.registrationDate | date:'dd/MM/yyyy' }}</td></ng-container>
  <ng-container matColumnDef="books">
    <th mat-header-cell *matHeaderCellDef>Livres liés</th>
    <td mat-cell *matCellDef="let x">
      <div class="relation-list" *ngIf="getBooksByReader(x.id).length; else noBook">
        <span *ngFor="let book of getBooksByReader(x.id)">{{ book }}</span>
      </div>
      <ng-template #noBook><span class="empty-relation">Aucun emprunt</span></ng-template>
    </td>
  </ng-container>
  <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th><td mat-cell *matCellDef="let x"><a mat-icon-button [routerLink]="['/readers/edit', x.id]" title="Modifier"><mat-icon>edit</mat-icon></a><button mat-icon-button color="warn" (click)="deleteReader(x)" title="Supprimer"><mat-icon>delete</mat-icon></button></td></ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr><tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table></div><mat-paginator [pageSize]="5" [pageSizeOptions]="[5,10,20]"></mat-paginator></mat-card>
